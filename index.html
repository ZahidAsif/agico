<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agico</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #0f172a;
            color: #ffffff;
            font-family: system-ui, -apple-system, sans-serif;
            text-align: center;
            user-select: none;
        }
        .container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 90%;
            max-width: 320px;
        }
        .btn {
            background: #2563eb;
            color: white;
            border: none;
            padding: 18px 24px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            transition: background 0.2s, transform 0.1s;
            text-decoration: none;
            display: inline-block;
            box-sizing: border-box;
        }
        .btn:active {
            background: #1d4ed8;
            transform: scale(0.98);
        }
        .btn-secondary {
            background: #059669;
        }
        .btn-secondary:active {
            background: #047857;
        }
        #status {
            margin-top: 10px;
            color: #94a3b8;
            font-size: 14px;
            min-height: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Trigger Button -->
        <button class="btn" onclick="sendTrigger()">Upload Claims</button>
        
        <!-- Dashboard Button -->
        <a href="dashboard.html" class="btn btn-secondary">View Dashboard</a>
        
        <p id="status"></p>
    </div>
    
    <script>
        // Insert your NEW classic token below
        const GITHUB_TOKEN = "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";
        const GITHUB_USER  = "ZahidAsif";
        const REPO_NAME    = "agico";
   
        function sendTrigger() {
            const status = document.getElementById('status');
            status.innerText = "Working on it...";
    
            fetch(`https://api.github.com/repos/${GITHUB_USER}/${REPO_NAME}/dispatches`, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${GITHUB_TOKEN}`,
                    'Accept': 'application/vnd.github.v3+json',
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ 
                    event_type: "run_vbs_trigger",
                    client_payload: { timestamp: Date.now() }
                })
            })
            .then(async response => {
                if (response.ok || response.status === 204) {
                    status.innerText = "Done!";
                    setTimeout(() => status.innerText = "", 3000);
                } else {
                    const errData = await response.json().catch(() => ({}));
                    status.innerText = `Error ${response.status}: ${errData.message || 'Unauthorized/Failed'}`;
                }
            })
            .catch(error => {
                status.innerText = "Network Error Occurred.";
                console.error(error);
            });
        }
    </script>
</body>
</html>
