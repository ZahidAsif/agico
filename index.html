<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRPS Upload</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #090d16;
            color: #ffffff;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            user-select: none;
            position: relative;
            overflow: hidden;
        }

        /* Animated Ambient Background Glows */
        .ambient-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(90px);
            pointer-events: none;
            opacity: 0.5;
            animation: pulse 8s ease-in-out infinite alternate;
        }

        .orb-1 {
            top: -10%;
            left: -10%;
            width: 450px;
            height: 450px;
            background: radial-gradient(circle, #3b82f6 0%, #1d4ed8 100%);
        }

        .orb-2 {
            bottom: -10%;
            right: -10%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, #059669 0%, #022c22 100%);
            animation-delay: -4s;
        }

        @keyframes pulse {
            0% { transform: scale(1) translate(0, 0); opacity: 0.4; }
            100% { transform: scale(1.2) translate(30px, -20px); opacity: 0.65; }
        }

        /* Glass Container Card */
        .glass-card {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 40px 30px;
            width: 90%;
            max-width: 360px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }

        .header {
            text-align: center;
            margin-bottom: 5px;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: -0.5px;
            color: #f8fafc;
        }

        .header p {
            font-size: 13px;
            color: #94a3b8;
            margin-top: 4px;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 14px;
            width: 100%;
        }

        /* Modern Buttons */
        .btn {
            position: relative;
            width: 100%;
            padding: 16px 20px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 14px;
            border: 1px solid transparent;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            overflow: hidden;
            letter-spacing: 0.2px;
        }

        /* Subtle shine overlay on buttons */
        .btn::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.15), transparent);
            transition: 0.5s;
        }

        .btn:hover::after {
            left: 100%;
        }

        /* Primary Button Style */
        .btn-primary {
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            color: #ffffff;
            box-shadow: 0 8px 20px -4px rgba(37, 99, 235, 0.5);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 25px -4px rgba(37, 99, 235, 0.7);
        }

        /* Secondary Button Style */
        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: #e2e8f0;
            border-color: rgba(255, 255, 255, 0.1);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #ffffff;
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(0) scale(0.98);
        }

        /* Status Banner */
        .status-container {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #94a3b8;
            min-height: 20px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #64748b;
            transition: background-color 0.3s;
        }

        .status-dot.active {
            background-color: #3b82f6;
            box-shadow: 0 0 10px #3b82f6;
            animation: blink 1s infinite alternate;
        }

        @keyframes blink {
            from { opacity: 0.4; }
            to { opacity: 1; }
        }

        /* Masked Password Modal Overlay */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.open {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-card {
            background: #111827;
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 20px;
            padding: 28px 24px;
            width: 90%;
            max-width: 320px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
        }

        .modal-card h3 {
            font-size: 16px;
            font-weight: 600;
            color: #f8fafc;
            text-align: center;
        }

        .pin-input {
            width: 100%;
            padding: 14px;
            font-size: 18px;
            letter-spacing: 4px;
            text-align: center;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.05);
            color: #ffffff;
            outline: none;
            transition: border-color 0.2s;
        }

        .pin-input:focus {
            border-color: #3b82f6;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
        }

        .modal-btn {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            border: none;
            cursor: pointer;
        }

        .modal-btn-confirm {
            background: #2563eb;
            color: #ffffff;
        }

        .modal-btn-cancel {
            background: rgba(255, 255, 255, 0.08);
            color: #94a3b8;
        }
    </style>
</head>
<body>

    <div class="ambient-orb orb-1"></div>
    <div class="ambient-orb orb-2"></div>

    <div class="glass-card">
        <div class="header">
            <h1>AGICO</h1>
            <p>Document Digitization Wing</p>
        </div>

        <div class="btn-group">
            <button class="btn btn-primary" onclick="openPinModal()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                Upload Claims
            </button>

            <a href="dashboard.html" class="btn btn-secondary">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>
                View Dashboard
            </a>
        </div>

        <div class="status-container">
            <div id="dot" class="status-dot"></div>
            <span id="status"></span>
        </div>
    </div>

    <!-- Masked PIN Input Modal -->
    <div id="pinModal" class="modal-overlay">
        <div class="modal-card">
            <h3>Enter Security PIN</h3>
            <input type="password" id="pinInput" class="pin-input" placeholder="••••" autocomplete="off" onkeydown="if(event.key==='Enter') submitPin()" />
            <div class="modal-actions">
                <button class="modal-btn modal-btn-cancel" onclick="closePinModal()">Cancel</button>
                <button class="modal-btn modal-btn-confirm" onclick="submitPin()">Confirm</button>
            </div>
        </div>
    </div>

    <script>
        const GITHUB_USER = "ZahidAsif";
        const REPO_NAME   = "agico";

        // EMBEDDED ENCRYPTED PAYLOAD
        const ENCRYPTED_DATA = {"salt":[94,138,116,195,165,236,41,90,211,230,251,53,38,45,115,214],"iv":[124,103,194,137,148,158,223,126,203,235,18,27],"ciphertext":[3,187,132,156,248,165,138,237,221,106,54,6,76,3,85,171,143,98,244,224,242,130,104,35,116,116,228,104,132,85,118,161,173,5,46,81,64,225,144,130,213,104,0,4,122,255,68,161,2,149,215,104,89,213,34,245]};

        function openPinModal() {
            const input = document.getElementById('pinInput');
            input.value = '';
            document.getElementById('pinModal').classList.add('open');
            setTimeout(() => input.focus(), 100);
        }

        function closePinModal() {
            document.getElementById('pinModal').classList.remove('open');
        }

        async function submitPin() {
            const pin = document.getElementById('pinInput').value.trim();
            closePinModal();
            if (!pin) return;

            const status = document.getElementById('status');
            const dot = document.getElementById('dot');

            status.innerText = "Authenticating...";
            dot.classList.add('active');

            const decryptedToken = await decryptToken(pin);

            if (!decryptedToken) {
                alert("Incorrect Security PIN, Sir.");
                status.innerText = "Access Denied";
                dot.classList.remove('active');
                return;
            }

            await sendTrigger(decryptedToken);
        }

        async function decryptToken(pin) {
            try {
                const enc = new TextEncoder();
                const keyMaterial = await crypto.subtle.importKey("raw", enc.encode(pin), "PBKDF2", false, ["deriveKey"]);
                const key = await crypto.subtle.deriveKey(
                    { name: "PBKDF2", salt: new Uint8Array(ENCRYPTED_DATA.salt), iterations: 100000, hash: "SHA-256" },
                    keyMaterial,
                    { name: "AES-GCM", length: 256 },
                    false,
                    ["decrypt"]
                );
                const decrypted = await crypto.subtle.decrypt(
                    { name: "AES-GCM", iv: new Uint8Array(ENCRYPTED_DATA.iv) },
                    key,
                    new Uint8Array(ENCRYPTED_DATA.ciphertext)
                );
                return new TextDecoder().decode(decrypted);
            } catch (e) {
                return null;
            }
        }

        async function sendTrigger(token) {
            const status = document.getElementById('status');
            const dot = document.getElementById('dot');

            status.innerText = "Initiating command...";

            try {
                const fileUrl = `https://api.github.com/repos/${GITHUB_USER}/${REPO_NAME}/contents/trigger.txt`;

                let sha = "";
                const getRes = await fetch(fileUrl, {
                    headers: { 
                        'Authorization': `token ${token}`,
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });

                if (getRes.ok) {
                    const fileData = await getRes.json();
                    sha = fileData.sha;
                }

                const putRes = await fetch(fileUrl, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${token}`,
                        'Accept': 'application/vnd.github.v3+json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: "Remote trigger from web interface",
                        content: btoa(Date.now().toString()),
                        sha: sha
                    })
                });

                if (putRes.ok) {
                    status.innerText = "Upload Command Sent!";
                    setTimeout(() => {
                        status.innerText = "";
                        dot.classList.remove('active');
                    }, 3000);
                } else {
                    const err = await putRes.json().catch(() => ({}));
                    status.innerText = `Error: ${err.message || 'Unauthorized'}`;
                    dot.classList.remove('active');
                }
            } catch (error) {
                status.innerText = "Network Connection Error";
                dot.classList.remove('active');
            }
        }
    </script>
</body>
</html>
