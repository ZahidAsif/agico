<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remote Trigger</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #0f172a;
            color: #ffffff;
            font-family: system-ui, -apple-system, sans-serif;
            text-align: center;
            user-select: none;
        }
        .btn {
            background: #2563eb;
            color: white;
            border: none;
            padding: 20px 40px;
            font-size: 20px;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            transition: background 0.2s;
        }
        .btn:active { background: #1d4ed8; }
        #status { margin-top: 20px; color: #94a3b8; }
    </style>
</head>
<body>

    <div>
        <button class="btn" onclick="sendTrigger()">Welcome</button>
        <p id="status">Continue...</p>
    </div>
    
    <script>
        const WEBHOOK_URL = "https://webhook.site/a59a2065-9189-4520-ba63-413d36c05a54";
    
        function sendTrigger() {
            const status = document.getElementById('status');
            status.innerText = "Initiating Connection...";
    
            fetch(WEBHOOK_URL, {
                method: 'POST',
                mode: 'no-cors', // <--- THIS BYPASSES THE CORS BLOCK
                headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify({ action: "run_vbs", timestamp: Date.now() })
            })
            .then(() => {
                // Note: with 'no-cors', response is opaque, but the request sent successfully!
                status.innerText = "Process Initiated!";
                setTimeout(() => status.innerText = "Continue...", 3000);
            })
            .catch(error => {
                status.innerText = "Error Occured.";
                console.error(error);
            });
        }
    </script>
</body>
</html>
