<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document Digitization</title>
    <style>
        :root {
            --main-bg-color: #0d0e10;    
            --highlighter-green: #ADFF2F;
            --p-bg: rgba(45, 49, 54, 0.8); 
            --n-bg: rgba(30, 41, 59, 0.8); 
            --header-bg: ##0d101c; 
            --text-gap: 2px; 
            --unprocessed-flash: emergency-red 0.8s infinite; 

            /* --- TITLE BOX VARIABLES --- */
            --title-bg-color: #0d101c;    
            --title-height: 30px;         
            --title-roundness: 6px;       
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Segoe UI Light", sans-serif; font-weight: 300; }
        body { background-color: var(--main-bg-color); color: #fff; min-height: 100vh; }
        
        /* --- LOADER --- */
        #loader {
            position: fixed; inset: 0; background-color: var(--main-bg-color); z-index: 100;
            display: flex; justify-content: center; align-items: center;
        }
        .loader-content { display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .loader-text { 
            font-size: 10px; text-transform: uppercase; letter-spacing: 1px; 
            color: var(--highlighter-green); animation: pulse 1.5s infinite; 
        }
        .spinner { width: 18px; height: 18px; border: 2px solid #222; border-top-color: var(--highlighter-green); border-radius: 50%; animation: rot 0.8s linear infinite; }
        
        @keyframes rot { to { transform: rotate(360deg); } }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* --- LAYOUT --- */
        .wrapper { padding: 4px; width: 100%; max-width: 100%; margin: 0 auto; }

        .title-box { 
            width: 100%; height: var(--title-height); background: var(--title-bg-color);
            border: 1px solid rgba(255, 255, 255, 0.08); border-radius: var(--title-roundness);
            display: flex; align-items: center; justify-content: center; margin-bottom: 8px;
        }

        .title-text { font-size: 16px; text-transform: uppercase; letter-spacing: 1px; opacity: 0.9; }

        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; width: 100%; }

        .col {
            background: rgba(255, 255, 255, 0.02); 
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 4px; display: flex; flex-direction: column; margin-bottom: 6px;
        }

        .header {
            background: var(--header-bg); padding: 4px; text-align: center;
            font-size: 13px; border-radius: 3px 4px 0 0; text-transform: uppercase;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .list { padding: 3px; display: flex; flex-direction: column; gap: 3px; }

  .row {
    display: flex; 
    align-items: center; 
    padding: 2px 6px;
    border-radius: 3px; 
    font-size: 9px; 
    position: relative; 
    overflow: hidden;
    margin-bottom: 3px; /* Creates clean separation */
    
    /* Subtle border instead of lift */
    border: 1px solid rgba(255, 255, 255, 0.08); 
    
    /* Standard depth shadow without the 'upward' movement */
    box-shadow: 0 2px 5px rgba(0, 0, 0, 0.6);
}

}


        .n-row { background: var(--n-bg); }
        .p-row { background: var(--p-bg); }
        .done-row { color: var(--highlighter-green) !important; }

        .name-box { flex: 1; min-width: 0; display: flex; flex-direction: column; z-index: 2; gap: var(--text-gap); }
        .b-name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .status { font-size: 7px; opacity: 0.5; line-height: 1; }

        .unprocessed-status { color: #FF4444 !important; animation: var(--unprocessed-flash); }

        @keyframes emergency-red {
            0%, 100% { opacity: 1; color: #FF4444; }
            50% { opacity: 0.2; color: #880000; }
        }

        .ready-qa .b-name, .ready-qa .icons, .ready-qa .status { animation: blink-ready 1.2s infinite ease-in-out; }
        @keyframes blink-ready { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }

        .ready-qa { border: 1px solid rgba(173, 255, 47, 0.4); }
        .ready-qa::after {
            content: ""; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(173, 255, 47, 0.1), transparent);
            animation: wave 2.5s infinite linear; z-index: 1;
        }

        .icons { display: flex; gap: 2px; align-items: center; margin-left: 4px; z-index: 2; }
        .icon-svg { width: 7px; height: 7px; fill: #4a4d50; }
        .icon-svg.on { fill: var(--highlighter-green); }
        .tick { width: 10px; height: 10px; fill: var(--highlighter-green); }

        @media (min-width: 800px) {
            .grid { grid-template-columns: 1fr; gap: 8px; }
            .header { font-size: 12px; text-align: left; padding: 6px 12px; }
            .list { display: grid; grid-template-columns: repeat(6, 1fr); gap: 4px; padding: 6px; }
            .row { padding: 2px 6px; min-height: 24px; }
            .status { font-size: 6.5px; }
        }

        @keyframes wave { 0% { left: -100%; } 100% { left: 100%; } }
    </style>
</head>
<body>

<div id="loader">
    <div class="loader-content">
        <div class="loader-text">Fetching Data...</div>
        <div class="spinner"></div>
    </div>
</div>

<div class="wrapper">
    <div class="title-box">
        <span class="title-text">Document Digitization Wing, Live Stats</span>
    </div>
    <div id="main-grid" class="grid"></div>
</div>

<script>
    const URL = "https://script.google.com/macros/s/AKfycbze8Gdex1xa3vchG9z7r5_whg0ivYqF2bL_vt_7K35CPGNUA8teIwycVBT5dgr2m4QD/exec";
    const USERS = { "u1": "SAAD", "u2": "YOUNAS", "u3": "ADEEL" };
    const ENABLE_SORT = true; 
    const ORDER = { "1110": 1, "1100": 2, "0000": 3, "0100": 4, "1000": 5, "1111": 6 };

    function getStopwatchZ(isOn) {
        const color = isOn ? 'var(--highlighter-green)' : '#4a4d50';
        return `
        <svg class="icon-svg" viewBox="0 0 24 24">
            <rect x="5" y="3" width="4" height="2" fill="${color}" transform="rotate(-30 7 4)"/>
            <rect x="15" y="3" width="4" height="2" fill="${color}" transform="rotate(30 17 4)"/>
            <rect x="11" y="2" width="2" height="2" fill="${color}"/>
            <circle cx="12" cy="13" r="8" fill="none" stroke="${color}" stroke-width="1.5"/>
            <path d="M9 10h6l-6 6h6" fill="none" stroke="${color}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>`;
    }

    const SVG_PATHS = [
        'M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z', // Doc
        'M19 8h-1V3H6v5H5c-1.66 0-3 1.34-3 3v6h4v4h12v-4h4v-6c0-1.66-1.34-3-3-3zM8 5h8v3H8V5zm10 12H6v-4h12v4zm2-6c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1z', // Scanner
        '', 
        'M20 18c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2H4c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2H0v2h24v-2h-4zM4 6h16v10H4V6z' // Screen
    ];

    async function refresh() {
        try {
            const res = await fetch(`${URL}?t=${Date.now()}`);
            const data = await res.json();
            const container = document.getElementById('main-grid');
            
            let newHtml = '';
            Object.keys(USERS).forEach(id => {
                if(data[id]) {
                    let listHtml = '';
                    let rawItems = data[id].split('\n').filter(l => l.trim() !== "").map(line => {
                        const m = line.match(/(.*)\[(\d{4})\]/);
                        return m ? { n: m[1].trim(), s: m[2] } : null;
                    }).filter(x => x);

                    if (ENABLE_SORT) rawItems.sort((a,b) => (ORDER[a.s]||99) - (ORDER[b.s]||99));

                    rawItems.forEach(item => {
                        let isUnprocessed = item.s === "0000";
                        let lbl = item.s==="1111"?"Uploaded in CRPS":
                                  item.s==="1110"?"Processing...":
                                  item.s==="1100"?"Data & Scanning Done":
                                  item.s==="1000"?"Scanning Done":
                                  item.s==="0100"?"DataEntry Done":
                                  "Pending..."; 

                        const isDone = item.s === "1111";
                        const isReady = item.s === "1110";
                        
                        let iconHtml = isDone ? 
                            '<svg class="tick" viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/></svg>' : 
                            [item.s[1], item.s[0], item.s[2], item.s[3]].map((v, i) => {
                                if(i === 2) return getStopwatchZ(v === '1');
                                return `<svg class="icon-svg ${v==='1'?'on':''}" viewBox="0 0 24 24"><path d="${SVG_PATHS[i]}"/></svg>`;
                            }).join('');

                        listHtml += `
                            <div class="row ${item.n.includes('P') ? 'p-row' : 'n-row'} ${isDone ? 'done-row' : ''} ${isReady ? 'ready-qa' : ''}">
                                <div class="name-box">
                                    <span class="b-name">${item.n}</span>
                                    <span class="status ${isUnprocessed ? 'unprocessed-status' : ''}">${lbl}</span>
                                </div>
                                <div class="icons">${iconHtml}</div>
                            </div>`;
                    });
                    newHtml += `<div class="col"><div class="header">${USERS[id]}</div><div class="list">${listHtml}</div></div>`;
                }
            });
            container.innerHTML = newHtml;
            document.getElementById('loader').style.display = 'none';
        } catch (e) { setTimeout(refresh, 5000); }
    }

    refresh();
    setInterval(refresh, 30000);
</script>
</body>
</html>
